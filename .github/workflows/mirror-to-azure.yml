name: Build, Push & Mirror

on:
  push:
    branches:
      - '**'   # all branches

env:
  IMAGE_NAME: azureboardgame

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 – Build image & push to AWS ECR + Azure ACR
  # ──────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        id: tag
        run: |
          echo "IMAGE_TAG=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════
      #  AWS ECR
      # ══════════════════════════════════════════
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.tag.outputs.IMAGE_TAG }} .

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}

          docker tag $IMAGE_NAME:$IMAGE_TAG \
            $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

          docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      # ══════════════════════════════════════════
      #  Azure Container Registry (ACR)
      # ══════════════════════════════════════════
      - name: Login to Azure ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username:     ${{ secrets.ACR_USERNAME }}
          password:     ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}
          ACR=${{ secrets.ACR_LOGIN_SERVER }}

          docker tag $IMAGE_NAME:$IMAGE_TAG \
            $ACR/$IMAGE_NAME:$IMAGE_TAG

          docker push $ACR/$IMAGE_NAME:$IMAGE_TAG

  # ──────────────────────────────────────────────
